name: MATLAB Tests with Coverage

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      # 映射许可证令牌（如果使用批量令牌）
      MLM_LICENSE_TOKEN: ${{ secrets.MLM_LICENSE_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a
          products: Simulink_Test
          cache: true

      - name: Run tests with coverage
        uses: matlab-actions/run-tests@v2
        with:
          # 指定测试文件夹
          source-folder: tests
          # 生成 JUnit 格式报告（便于 GitHub 显示）
          test-results: test-results.xml
          # 生成 Cobertura 格式覆盖率报告
          code-coverage-cobertura: coverage.xml
          # 显示详细输出
          verbose: true

      # 可选：上传测试结果作为 artifact
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # 即使测试失败也上传
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
