name: Cross-Platform MATLAB Tests

on: [push]

jobs:
  test-matrix:
    name: ${{ matrix.os }} / MATLAB ${{ matrix.release }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        release: [R2023b, R2024a]  # 测试多个 MATLAB 版本
        exclude:
          # 可选：排除某些组合（如旧版本 + 新系统）
          - os: macos-latest
            release: R2023b

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MATLAB ${{ matrix.release }}
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.release }}
          cache: true

      - name: Run tests
        uses: matlab-actions/run-tests@v2
        with:
          source-folder: tests
          # 跳过某些平台特有的测试（如果需要）
          # select-by-folder: tests/common

      - name: Report status
        if: always()
        run: |
          echo "✅ ${{ matrix.os }} / MATLAB ${{ matrix.release }} completed"
